# This is a basic workflow to help you get started with Actions

name: deploy-book

# Updates public documentation for new releases, or on demand.
on:
  release:
    types: [published]
  workflow_dispatch: {}

# This job installs dependencies, builds the book, and pushes it to `gh-pages`
jobs:
  build-book:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    # Install dependencies
    - name: Set up Python 3.x
      uses: actions/setup-python@v6
      with:
        python-version: 3.x

    - name: Install Graphviz (for API inheritance diagrams)
      run: |
        sudo apt-get update && sudo apt-get install -y graphviz

    - name: Install dependencies
      run: |
        pip install -r docs/requirements.txt

    # Defensive cleanup: strip any orphaned ipywidgets state (metadata.widgets
    # entries no longer referenced by a cell's widget-view output) before
    # building, so stale widget content (e.g. old progress-bar text) can't
    # leak into the published HTML even if it was hand-edited back in after
    # the lint-notebooks check last ran.
    - name: Strip orphaned ipywidgets state
      run: |
        python scripts/check_notebook_widgets.py --fix

    # Build the book
    - name: Build the book
      env:
        ABTEM_DOCS_VERSION: stable
      run: |
        jupyter book build docs

    - name: Upload book
      uses: actions/upload-artifact@v7
      with:
        name: html-pages
        path: ./docs/_build/html

  # Push the book's HTML to the root of github-pages, keeping the /dev/
  # docs (published separately by deploy-dev.yml) intact.
  deploy-book:
    needs: build-book
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-push
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v8
        with:
          name: html-pages
          path: ./site

      - name: Check out current gh-pages
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages-current

      - name: Preserve /dev/ docs in the new snapshot
        run: |
          if [ -d gh-pages-current/dev ]; then
            cp -R gh-pages-current/dev ./site/dev
          fi

      - name: GitHub Pages action
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
